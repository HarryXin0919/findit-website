<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1B2A" />
      <stop offset="100%" style="stop-color:#1B2838" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#61C4E3" />
      <stop offset="100%" style="stop-color:#3A7BD5" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="hexClip">
      <polygon points="256,20 458,136 458,376 256,492 54,376 54,136"/>
    </clipPath>
  </defs>
  
  <!-- Outer hexagon -->
  <polygon points="256,20 458,136 458,376 256,492 54,376 54,136" fill="url(#bgGrad)"/>
  
  <!-- Hex border glow -->
  <polygon points="256,20 458,136 458,376 256,492 54,376 54,136" fill="none" stroke="#61C4E3" stroke-width="2" opacity="0.35"/>
  
  <!-- Inner hex border -->
  <polygon points="256,42 440,150 440,362 256,470 72,362 72,150" fill="none" stroke="#61C4E3" stroke-width="0.8" opacity="0.15"/>
  
  <!-- Subtle circuit/tech pattern -->
  <g opacity="0.04" clip-path="url(#hexClip)" stroke="#61C4E3" stroke-width="0.5">
    <line x1="54" y1="180" x2="180" y2="180"/><line x1="180" y1="180" x2="180" y2="100"/>
    <line x1="332" y1="220" x2="458" y2="220"/><line x1="332" y1="220" x2="332" y2="140"/>
    <line x1="54" y1="330" x2="200" y2="330"/><line x1="200" y1="330" x2="200" y2="410"/>
    <line x1="300" y1="340" x2="458" y2="340"/><line x1="300" y1="340" x2="300" y2="420"/>
    <circle cx="180" cy="100" r="3" fill="#61C4E3"/>
    <circle cx="332" cy="140" r="3" fill="#61C4E3"/>
    <circle cx="200" cy="410" r="3" fill="#61C4E3"/>
    <circle cx="300" cy="420" r="3" fill="#61C4E3"/>
  </g>
  
  <!-- Main icon: Stylized "寻" character merged with magnifying glass -->
  <g transform="translate(256, 195)">
    
    <!-- Magnifying glass body -->
    <circle cx="0" cy="-10" r="85" fill="none" stroke="url(#accentGrad)" stroke-width="4.5" opacity="0.8"/>
    
    <!-- Pulse heartbeat wave across the glass (IronPulse signature) -->
    <g filter="url(#glow)">
      <path d="M -75,-10 L -45,-10 L -35,-50 L -18,25 L -5,-10 L 10,-10 L 20,-50 L 35,25 L 45,-10 L 75,-10" 
            fill="none" stroke="#61C4E3" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>
    </g>
    
    <!-- Target crosshair -->
    <g opacity="0.5">
      <line x1="0" y1="-35" x2="0" y2="-18" stroke="#61C4E3" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="0" y1="-2" x2="0" y2="15" stroke="#61C4E3" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-25" y1="-10" x2="-10" y2="-10" stroke="#61C4E3" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="10" y1="-10" x2="25" y2="-10" stroke="#61C4E3" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    
    <!-- Center dot -->
    <circle cx="0" cy="-10" r="4" fill="#61C4E3" opacity="0.9"/>
    
    <!-- Handle with pulse node -->
    <line x1="60" y1="50" x2="110" y2="100" stroke="url(#accentGrad)" stroke-width="5.5" stroke-linecap="round"/>
    
    <!-- Pulse nodes on handle -->
    <circle cx="80" cy="70" r="2.5" fill="#61C4E3" opacity="0.4"/>
    <circle cx="95" cy="85" r="2.5" fill="#61C4E3" opacity="0.3"/>
  </g>
  
  <!-- Text: 寻件 -->
  <text x="256" y="370" text-anchor="middle" font-family="'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif" font-size="58" font-weight="700" fill="#FFFFFF" letter-spacing="14">寻件</text>
  
  <!-- Accent underline -->
  <line x1="185" y1="386" x2="327" y2="386" stroke="url(#accentGrad)" stroke-width="1.2" opacity="0.5"/>
  
  <!-- FINDITEM -->
  <text x="256" y="412" text-anchor="middle" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="15" font-weight="600" fill="#61C4E3" letter-spacing="7" opacity="0.85">FINDITEM</text>
  
  <!-- IronPulse 6941 -->
  <text x="256" y="444" text-anchor="middle" font-family="-apple-system, 'SF Pro Display', sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.3)" letter-spacing="3">IRONPULSE 6941</text>
</svg>