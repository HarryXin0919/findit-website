<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#61C4E3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3A7BD5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="innerGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.2)" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="108" ry="108" fill="url(#bgGrad)"/>
  <rect x="16" y="16" width="480" height="480" rx="108" ry="108" fill="url(#innerGlow)"/>
  
  <!-- Radar / sonar rings -->
  <g transform="translate(256, 240)" opacity="0.15">
    <circle cx="0" cy="0" r="160" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  </g>
  
  <!-- Radar sweep line -->
  <g transform="translate(256, 240)">
    <line x1="0" y1="0" x2="0" y2="-145" stroke="#FFFFFF" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
    <!-- Sweep arc -->
    <path d="M 0,-145 A 145,145 0 0,1 102,-102" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.25"/>
    <!-- Found item dot -->
    <circle cx="72" cy="-96" r="10" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="72" cy="-96" r="18" fill="#FFFFFF" opacity="0.15"/>
  </g>
  
  <!-- Center dot -->
  <circle cx="256" cy="240" r="8" fill="#FFFFFF"/>
  
  <!-- Text: 寻件 -->
  <text x="256" y="432" text-anchor="middle" font-family="'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif" font-size="72" font-weight="700" fill="#FFFFFF" letter-spacing="12">寻件</text>
  
  <!-- Subtitle -->
  <text x="256" y="468" text-anchor="middle" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="20" font-weight="500" fill="rgba(255,255,255,0.7)" letter-spacing="6">FINDITEM</text>
</svg>