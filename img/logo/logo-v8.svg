<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#61C4E3" />
      <stop offset="100%" style="stop-color:#4BA8D0" />
    </linearGradient>
  </defs>
  
  <!-- Dark background -->
  <rect width="512" height="512" rx="100" fill="#0A0E14"/>
  
  <!-- Single clean gear outline - left part black filled, right part blue -->
  <!-- Gear: 8 teeth, clean geometric -->
  <g transform="translate(256, 220)">
    
    <!-- Black gear (full, behind) -->
    <path d="
      M 0,-108 
      L 20,-104 L 22,-82 L 36,-78 L 48,-94 L 64,-82 L 54,-64 L 64,-50 L 82,-54 L 88,-36 L 70,-28 L 72,-12 L 92,-6 L 92,14 L 72,16 L 68,32 L 86,42 L 78,60 L 58,54 L 48,66 L 60,84 L 44,94 L 30,78 L 16,84 L 20,104 L 0,108 
      L -20,104 L -16,84 L -30,78 L -44,94 L -60,84 L -48,66 L -58,54 L -78,60 L -86,42 L -68,32 L -72,16 L -92,14 L -92,-6 L -72,-12 L -70,-28 L -88,-36 L -82,-54 L -64,-50 L -54,-64 L -64,-82 L -48,-94 L -36,-78 L -22,-82 L -20,-104 Z
    " fill="#1C1C1E"/>
    
    <!-- Blue overlay: right half of gear, clipped by diagonal -->
    <clipPath id="diagClip">
      <polygon points="-100,120 120,-100 120,120"/>
    </clipPath>
    <path d="
      M 0,-108 
      L 20,-104 L 22,-82 L 36,-78 L 48,-94 L 64,-82 L 54,-64 L 64,-50 L 82,-54 L 88,-36 L 70,-28 L 72,-12 L 92,-6 L 92,14 L 72,16 L 68,32 L 86,42 L 78,60 L 58,54 L 48,66 L 60,84 L 44,94 L 30,78 L 16,84 L 20,104 L 0,108 
      L -20,104 L -16,84 L -30,78 L -44,94 L -60,84 L -48,66 L -58,54 L -78,60 L -86,42 L -68,32 L -72,16 L -92,14 L -92,-6 L -72,-12 L -70,-28 L -88,-36 L -82,-54 L -64,-50 L -54,-64 L -64,-82 L -48,-94 L -36,-78 L -22,-82 L -20,-104 Z
    " fill="url(#blueGrad)" clip-path="url(#diagClip)"/>
    
    <!-- Diagonal divider line -->
    <line x1="-100" y1="120" x2="120" y2="-100" stroke="#0A0E14" stroke-width="4"/>
    
    <!-- Center circle -->
    <circle cx="0" cy="0" r="36" fill="#0A0E14"/>
    <circle cx="0" cy="0" r="36" fill="none" stroke="#2A2A2E" stroke-width="1.5"/>
    
    <!-- Search/location icon in center: crosshair -->
    <g stroke="#61C4E3" stroke-width="2" stroke-linecap="round" opacity="0.9">
      <line x1="0" y1="-18" x2="0" y2="-8"/>
      <line x1="0" y1="8" x2="0" y2="18"/>
      <line x1="-18" y1="0" x2="-8" y2="0"/>
      <line x1="8" y1="0" x2="18" y2="0"/>
    </g>
    <circle cx="0" cy="0" r="5" fill="none" stroke="#61C4E3" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="2" fill="#61C4E3"/>
  </g>
  
  <!-- Text: 寻件 -->
  <text x="256" y="390" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif" font-size="62" font-weight="700" fill="#FFFFFF" letter-spacing="18">寻件</text>
  
  <!-- Subtitle -->
  <text x="256" y="425" text-anchor="middle" font-family="-apple-system,'SF Pro Display','Helvetica Neue',sans-serif" font-size="14" font-weight="600" fill="#61C4E3" letter-spacing="10" opacity="0.7">FINDITEM</text>
  
  <!-- IronPulse 6941 -->
  <text x="256" y="458" text-anchor="middle" font-family="-apple-system,'SF Pro Display',sans-serif" font-size="11" font-weight="400" fill="rgba(255,255,255,0.25)" letter-spacing="4">IRONPULSE 6941</text>
</svg>