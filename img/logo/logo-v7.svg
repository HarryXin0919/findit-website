<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1B2A" />
      <stop offset="100%" style="stop-color:#1B2838" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#61C4E3" />
      <stop offset="100%" style="stop-color:#3A7BD5" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bgGrad)"/>
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="#61C4E3" stroke-width="1.5" opacity="0.25"/>
  
  <g transform="translate(256, 185)">
    
    <!-- BLACK GEAR (large, main) - IronPulse style -->
    <g>
      <!-- Outer gear ring with teeth -->
      <path d="
        M 0,-95 L 14,-95 L 14,-80 L 14,-80 
        A 80,80 0 0,1 68,-56 L 80,-44 L 80,-30 
        A 80,80 0 0,1 80,30 L 80,44 L 68,56
        A 80,80 0 0,1 30,80 L 30,80 L 14,80 L 14,95 L 0,95 L 0,80
        A 80,80 0 0,1 -56,68 L -56,68 L -44,80 L -56,80
        A 80,80 0 0,1 -80,44 L -80,30 L -95,30 L -95,14 L -80,14
        A 80,80 0 0,1 -80,-30 L -80,-44 L -95,-44 L -95,-56 L -80,-56
        A 80,80 0 0,1 -44,-80 L -30,-80 L -30,-95 L -14,-95 L -14,-80
        A 80,80 0 0,1 0,-95 Z
      " fill="#1a1a1a" opacity="0.95"/>
      
      <!-- Simplified clean gear -->
      <circle cx="0" cy="0" r="75" fill="#1a1a1a"/>
      <!-- 12 teeth -->
      <g fill="#1a1a1a">
        <rect x="-10" y="-98" width="20" height="26" rx="3" transform="rotate(0)"/>
        <rect x="-10" y="-98" width="20" height="26" rx="3" transform="rotate(30)"/>
        <rect x="-10" y="-98" width="20" height="26" rx="3" transform="rotate(60)"/>
        <rect x="-10" y="-98" width="20" height="26" rx="3" transform="rotate(90)"/>
        <rect x="-10" y="-98" width="20" height="26" rx="3" transform="rotate(120)"/>
        <rect x="-10" y="-98" width="20" height="26" rx="3" transform="rotate(150)"/>
        <rect x="-10" y="-98" width="20" height="26" rx="3" transform="rotate(180)"/>
        <rect x="-10" y="-98" width="20" height="26" rx="3" transform="rotate(210)"/>
        <rect x="-10" y="-98" width="20" height="26" rx="3" transform="rotate(240)"/>
        <rect x="-10" y="-98" width="20" height="26" rx="3" transform="rotate(270)"/>
        <rect x="-10" y="-98" width="20" height="26" rx="3" transform="rotate(300)"/>
        <rect x="-10" y="-98" width="20" height="26" rx="3" transform="rotate(330)"/>
      </g>
      <!-- Inner circle -->
      <circle cx="0" cy="0" r="48" fill="#0D1B2A"/>
      <circle cx="0" cy="0" r="48" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
    </g>
    
    <!-- BLUE GEAR (smaller, offset upper-right) - IronPulse style -->
    <g transform="translate(42, -42)">
      <circle cx="0" cy="0" r="48" fill="#61C4E3"/>
      <!-- 8 teeth -->
      <g fill="#61C4E3">
        <rect x="-7" y="-62" width="14" height="16" rx="2" transform="rotate(0)"/>
        <rect x="-7" y="-62" width="14" height="16" rx="2" transform="rotate(45)"/>
        <rect x="-7" y="-62" width="14" height="16" rx="2" transform="rotate(90)"/>
        <rect x="-7" y="-62" width="14" height="16" rx="2" transform="rotate(135)"/>
        <rect x="-7" y="-62" width="14" height="16" rx="2" transform="rotate(180)"/>
        <rect x="-7" y="-62" width="14" height="16" rx="2" transform="rotate(225)"/>
        <rect x="-7" y="-62" width="14" height="16" rx="2" transform="rotate(270)"/>
        <rect x="-7" y="-62" width="14" height="16" rx="2" transform="rotate(315)"/>
      </g>
      <!-- Inner circle -->
      <circle cx="0" cy="0" r="26" fill="#0D1B2A"/>
      <circle cx="0" cy="0" r="26" fill="none" stroke="rgba(97,196,227,0.3)" stroke-width="1"/>
    </g>
    
    <!-- Diagonal slash (IronPulse signature diagonal line) -->
    <line x1="-70" y1="70" x2="70" y2="-70" stroke="#FFFFFF" stroke-width="4" opacity="0.9" filter="url(#glow)"/>
    
    <!-- Magnifying glass rim (search overlay) -->
    <circle cx="0" cy="0" r="85" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-dasharray="8 4"/>
    
    <!-- Pulse heartbeat inside center (IronPulse DNA) -->
    <g filter="url(#glow)" opacity="0.7" transform="translate(0, 0)">
      <path d="M -35,0 L -18,0 L -10,-22 L -2,18 L 8,0 L 18,0 L 25,-22 L 35,18 L 42,0" 
            fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <!-- Center search dot -->
    <circle cx="0" cy="0" r="4" fill="#61C4E3"/>
    <circle cx="0" cy="0" r="8" fill="none" stroke="#61C4E3" stroke-width="1" opacity="0.4"/>
  </g>
  
  <!-- Text: 寻件 -->
  <text x="256" y="370" text-anchor="middle" font-family="'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif" font-size="60" font-weight="700" fill="#FFFFFF" letter-spacing="16">寻件</text>
  
  <!-- Accent line -->
  <line x1="185" y1="387" x2="327" y2="387" stroke="url(#blueGrad)" stroke-width="1.5" opacity="0.45"/>
  
  <!-- FINDITEM -->
  <text x="256" y="415" text-anchor="middle" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="16" font-weight="600" fill="#61C4E3" letter-spacing="8" opacity="0.85">FINDITEM</text>
  
  <!-- IronPulse 6941 -->
  <text x="256" y="448" text-anchor="middle" font-family="-apple-system, 'SF Pro Display', sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.3)" letter-spacing="3">IRONPULSE 6941</text>
</svg>