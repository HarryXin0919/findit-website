<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#61C4E3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3A7BD5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#61C4E3;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#3A7BD5;stop-opacity:0.08" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="108" ry="108" fill="#0A0A0A"/>
  <rect x="16" y="16" width="480" height="480" rx="108" ry="108" fill="url(#grad2)"/>
  
  <!-- Magnifying glass - main icon -->
  <g transform="translate(256, 230)">
    <!-- Glass circle -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="url(#grad1)" stroke-width="14" opacity="0.9"/>
    <!-- Inner highlight ring -->
    <circle cx="0" cy="0" r="88" fill="none" stroke="#61C4E3" stroke-width="1.5" opacity="0.2"/>
    
    <!-- Crosshair / location pin inside -->
    <g opacity="0.85">
      <circle cx="0" cy="0" r="12" fill="#61C4E3"/>
      <circle cx="0" cy="0" r="28" fill="none" stroke="#61C4E3" stroke-width="2.5"/>
      <line x1="0" y1="-50" x2="0" y2="-32" stroke="#61C4E3" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="0" y1="32" x2="0" y2="50" stroke="#61C4E3" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-50" y1="0" x2="-32" y2="0" stroke="#61C4E3" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="32" y1="0" x2="50" y2="0" stroke="#61C4E3" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    
    <!-- Handle -->
    <line x1="78" y1="78" x2="140" y2="140" stroke="url(#grad1)" stroke-width="14" stroke-linecap="round"/>
  </g>
  
  <!-- Text: 寻件 -->
  <text x="256" y="430" text-anchor="middle" font-family="'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif" font-size="72" font-weight="700" fill="#FFFFFF" letter-spacing="12">寻件</text>
  
  <!-- Subtitle: FindItem -->
  <text x="256" y="466" text-anchor="middle" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="20" font-weight="500" fill="#61C4E3" letter-spacing="6" opacity="0.8">FINDITEM</text>
</svg>